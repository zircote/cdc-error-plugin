---
name: CI

# Validate the plugin/marketplace manifests and the workflow files themselves
# on every push and PR. This repo is a single-plugin marketplace with no
# central org to share reusable workflows with, so pin-check and actionlint
# run as inline, self-contained jobs rather than `uses:` calls to a shared repo.

"on":
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Every `uses:` in .github/workflows MUST be pinned to a full 40-char commit
  # SHA, never a mutable tag or branch (supply-chain hardening: a compromised
  # tag/branch can't silently change what a workflow runs). Local reusable
  # calls (`uses: ./...`) and digest-pinned container actions
  # (`uses: docker://...@sha256`) are exempt.
  pin-check:
    name: pin-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assert every `uses:` is pinned to a 40-char commit SHA
        run: |
          set -euo pipefail
          rc=0
          while IFS= read -r hit; do
            file="${hit%%:*}"; rest="${hit#*:}"
            lineno="${rest%%:*}"; content="${rest#*:}"
            value="${content#*uses:}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%%[[:space:]]*}"
            case "$value" in
              ./*) continue ;;
              docker://*@sha256:*) continue ;;
            esac
            ref="${value##*@}"
            if ! printf '%s' "$ref" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "::error file=${file},line=${lineno}::unpinned action reference: ${value}"
              rc=1
            fi
          done < <(grep -rnE '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]*[^[:space:]]+@' .github || true)
          if [ "$rc" -eq 0 ]; then
            echo "All action references under .github are pinned to a 40-char SHA."
          fi
          exit "$rc"

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install actionlint (pinned + checksum-verified)
        env:
          VERSION: "1.7.12"
          SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/actionlint"
          mkdir -p "${install_dir}"
          curl -sSfL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_linux_amd64.tar.gz"
          echo "${SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz -C "${install_dir}" actionlint
          chmod +x "${install_dir}/actionlint"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          "${install_dir}/actionlint" --version
      - name: Run actionlint
        run: actionlint

  validate:
    name: claude plugin validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Claude Code CLI (pinned)
        env:
          CLAUDE_VERSION: "2.1.199"
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_VERSION}"
      - name: Validate marketplace + plugin manifest
        run: claude plugin validate . --strict
