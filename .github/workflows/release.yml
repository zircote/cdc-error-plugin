---
name: Release

# Attested delivery for this plugin/marketplace repo, scaled to what it ships:
# a markdown/JSON skill bundle, not a container image. No dependency tree to
# SBOM, no registry to sign into, no central org to share reusable signing
# workflows with — so this is the "binaries/bundles only" shape: build a
# reproducible tarball, attest SLSA build provenance, re-verify it in-run
# (fail-closed) before the tag-gated publish step.
#
# Flow: build tarball -> attest-build-provenance -> verify (fail-closed) ->
#       publish (tag push only).
#
# Dry-run: workflow_dispatch exercises build -> attest -> verify; publish is
# gated on `refs/tags/v*.*.*` and is skipped on a manual dispatch.

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  meta:
    name: Resolve Metadata
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve artifact name and version
        id: meta
        run: |
          set -euo pipefail
          NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${NAME} ${VERSION}"

  build:
    name: Build Artifact
    needs: [meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build reproducible tarball
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --prefix="${NAME}-${VERSION}/" \
            -o "dist/${NAME}-${VERSION}.tar.gz" "${GITHUB_SHA}"
          sha256sum dist/*
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist/*
          if-no-files-found: error

  verify:
    name: Verify Attestation (fail-closed)
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist
      - name: Verify SLSA build provenance (fail-closed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh attestation verify dist/* --repo "${GITHUB_REPOSITORY}" \
            --predicate-type https://slsa.dev/provenance/v1
          echo "Provenance verified."

  publish:
    name: Publish Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [meta, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist
      - name: Generate checksums
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cd dist
          sha256sum -- * > "${NAME}-${VERSION}-checksums.txt"
          cat "${NAME}-${VERSION}-checksums.txt"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          PRERELEASE=()
          case "${GITHUB_REF_NAME}" in *-*) PRERELEASE=(--prerelease) ;; esac
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" --title "Release ${VERSION}" \
            --generate-notes "${PRERELEASE[@]}"
